# ============================================
# Test 环境配置 - H2 文件模式（数据持久化）
# ============================================
# 激活方式：启动时添加 --spring.profiles.active=test
# 例：mvn spring-boot:run -Dspring-boot.run.profiles=test

# H2 文件数据库（数据持久化到文件，重启不丢失）
spring.datasource.url=jdbc:h2:file:./data/coursedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 控制台
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 防止 CommandLineRunner 重复插入数据（生产环境建议使用）
# spring.sql.init.mode=never